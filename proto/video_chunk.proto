syntax = "proto3";
package prism;

message LayerHash {
  uint32 layer_index  = 1;
  bytes  payload_hash = 2;
}

message VideoChunk {
  string stream_id        = 1;
  uint64 sequence         = 2;
  uint64 timestamp_ms     = 3;
  bytes  payload          = 4;
  bytes  streamer_pubkey  = 5;
  bytes  streamer_sig     = 6;
  bytes  prev_chunk_hash  = 7;
  repeated LayerHash layer_hashes = 8;
}
